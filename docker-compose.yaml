version: '3'
services:
  shop_api:
    build: 
      context: .
    command: >
        sh -c "python manage.py migrate && 
        python manage.py runserver 0.0.0.0:8000"
    ports:
      - '8001:8000' #host:container

  shop_data:
    image: 'postgres:14'
    environment:
      POSTGRES_DB: shop_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
    volumes:
      - data:/var/lib/postgresql/data
volumes:
  data:
